# Argyros nginx config — argyros.xyz
#
# Services:
#   api.argyros.xyz    → argyros-community runtime  (localhost:8080)
#   license.argyros.xyz → argyros-control-plane      (localhost:8081)
#
# Setup:
#   1. Install: apt install -y nginx certbot python3-certbot-nginx
#   2. Copy to /etc/nginx/sites-available/argyros.conf
#   3. ln -s /etc/nginx/sites-available/argyros.conf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#   5. certbot --nginx -d api.argyros.xyz -d license.argyros.xyz
#      (certbot auto-fills the ssl_certificate lines below)

# ── Upstreams ─────────────────────────────────────────────────────────────────

upstream argyros_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

upstream argyros_license {
    server 127.0.0.1:8081;
    keepalive 32;
}

# ── Rate limiting (nginx-level pre-filter) ────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
limit_req_status 429;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.argyros.xyz license.argyros.xyz;
    return 301 https://$host$request_uri;
}

# ── api.argyros.xyz (route-engine runtime) ────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.argyros.xyz;

    # Filled in by: certbot --nginx -d api.argyros.xyz
    ssl_certificate     /etc/letsencrypt/live/api.argyros.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.argyros.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Only expose API and health — pprof/debug must stay private
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass         http://argyros_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    location /health {
        proxy_pass         http://argyros_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # Block everything else (no debug endpoints exposed)
    location / {
        return 404;
    }
}

# ── license.argyros.xyz (control-plane) ──────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.argyros.xyz;

    # Filled in by: certbot --nginx -d license.argyros.xyz
    ssl_certificate     /etc/letsencrypt/live/license.argyros.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license.argyros.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    # License info endpoint — called by community binaries at startup
    location /v1/license/ {
        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Auth endpoints (signup / login / OAuth / wallet)
    location /auth/ {
        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # User self-service (API key management, profile)
    location /me {
        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /keys {
        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin endpoints — restrict to your own IP
    location /admin/ {
        # Replace with your actual management IP (or remove for open access + ADMIN_TOKEN)
        allow  127.0.0.1;
        deny   all;

        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://argyros_license;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    location / {
        return 404;
    }
}
