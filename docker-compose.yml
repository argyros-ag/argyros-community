services:
  route-engine:
    image: ghcr.io/argyros-ag/argyros-community:${VERSION:-latest}
    env_file: .env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
